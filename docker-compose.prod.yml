services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-voice_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    env_file: .env.production
    working_dir: /app/apps/api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-voice_db}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: ${PORT:-3000}
    command: ["node", "dist/src/main.js"]
    volumes:
      - voice_storage:/app/storage
      - voice_logs:/app/apps/api/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    env_file: .env.production
    working_dir: /app/apps/api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-voice_db}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    command: ["node", "dist/src/workers/worker.main.js"]
    volumes:
      - voice_storage:/app/storage
      - voice_logs:/app/apps/api/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    profiles: ["ops"]
    env_file: .env.production
    working_dir: /app/apps/api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-voice_db}?schema=${DB_SCHEMA:-public}
      DB_HOST: db
      DB_PORT: 5432
      NODE_ENV: production
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  client:
    image: ${CLIENT_IMAGE}:${IMAGE_TAG}
    ports:
      - "${CLIENT_PORT:-8080}:80"
    environment:
      BACKEND_UPSTREAM: http://backend:${PORT:-3000}
      CLIENT_API_BASE_URL: ${CLIENT_API_BASE_URL:-/api/v1}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_prod_data:
  voice_storage:
  voice_logs:
